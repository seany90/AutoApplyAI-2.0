<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoApplyAI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #0f172a; /* slate-950 */
      color: #f8fafc; /* slate-50 */
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b; /* slate-800 */
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 600;
    }
    .text-blue { color: #3b82f6; }
    
    .status-card {
      background-color: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .status-card h3 {
      margin: 0 0 4px 0;
      font-size: 14px;
      color: #94a3b8; /* slate-400 */
    }
    .status-card p {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-primary {
      background-color: #2563eb; /* blue-600 */
      color: white;
    }
    .btn-primary:hover {
      background-color: #1d4ed8; /* blue-700 */
    }
    .btn-primary:disabled {
      background-color: #475569;
      cursor: not-allowed;
    }
    
    .auth-warning {
      display: none;
      background-color: #7f1d1d; /* red-900 */
      color: #fca5a5; /* red-300 */
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }

    .loader {
      display: none;
      border: 2px solid #1e293b;
      border-top: 2px solid #3b82f6;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 8V4H8"></path><rect width="16" height="12" x="4" y="8" rx="2"></rect><path d="M2 14h2"></path><path d="M20 14h2"></path><path d="M15 13v2"></path><path d="M9 13v2"></path>
    </svg>
    <h1>AutoApply<span class="text-blue">AI</span></h1>
  </div>

  <div id="authWarning" class="auth-warning">
    Please log in to the AutoApplyAI web app to use the extension.
  </div>

  <div class="status-card" id="jobCard">
    <h3>Current Job Detected</h3>
    <p id="jobTitle">Scanning page...</p>
    <p id="jobCompany" style="color: #64748b; font-size: 12px; margin-top: 2px;"></p>
  </div>

  <button id="applyBtn" class="btn btn-primary" disabled>
    <div class="loader" id="btnLoader"></div>
    <span id="btnText">Auto-Fill Application</span>
  </button>

  <script src="popup.js"></script>
</body>
</html>
